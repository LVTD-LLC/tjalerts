{% if messages %}
<div class="pointer-events-none fixed inset-x-0 top-4 z-50" aria-live="polite">
  <div class="app-container space-y-2">
    {% for message in messages %}
    <div
      data-controller="reveal"
      data-reveal-target="item"
      class="pointer-events-auto flex items-start justify-between gap-4 rounded-md border px-4 py-3 text-sm shadow-lg {% if message.level == DEFAULT_MESSAGE_LEVELS.WARNING %}border-red-200 bg-red-50 text-red-900{% else %}border-emerald-200 bg-emerald-50 text-emerald-900{% endif %}"
      role="status"
    >
      <p class="font-medium">{{ message }}</p>
      <button
        data-action="click->reveal#hide"
        type="button"
        class="rounded-md p-1 {% if message.level == DEFAULT_MESSAGE_LEVELS.WARNING %}text-red-700 hover:bg-red-100{% else %}text-emerald-700 hover:bg-emerald-100{% endif %}"
      >
        <span class="sr-only">Dismiss</span>
        <svg class="h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
